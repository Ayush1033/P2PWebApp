<!DOCTYPE html>
<html>
<head>
  <title>P2P WebRTC Chat</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body id="body" class="bg-light">

<div class="container mt-4">

  <!-- Header -->
  <div class="card shadow">

    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

      <h5 class="mb-0">P2P WebRTC Chat</h5>

      <div>
        <span id="status" class="badge bg-danger">Disconnected</span>
        <button onclick="toggleDarkMode()" class="btn btn-sm btn-light ms-2">🌙</button>
      </div>

    </div>

    <div class="card-body">

      <!-- Username -->
      <div class="row mb-3">
        <div class="col-md-6">
          <input id="usernameInput" class="form-control" placeholder="Enter Username">
        </div>

        <div class="col-md-6">
          <input id="roomInput" class="form-control" placeholder="Enter Room ID">
        </div>
      </div>

      <div class="mb-3">
        <button onclick="joinRoom()" class="btn btn-success w-100">
          Join Room
        </button>
      </div>

      <!-- Chat Window -->
      <div id="chat" class="chat-box border rounded p-3 mb-2 bg-white"></div>

      <!-- Typing Indicator -->
      <div id="typingIndicator" class="text-muted small mb-2"></div>

      <!-- Message Input -->
      <div class="input-group">

        <input id="messageInput" class="form-control" placeholder="Type a message..." oninput="sendTyping()">

        <button onclick="sendMessage()" class="btn btn-primary">
          Send
        </button>

        <input type="file" id="fileInput" hidden>

        <button onclick="document.getElementById('fileInput').click()" class="btn btn-secondary">
          📎
        </button>

      </div>

    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
